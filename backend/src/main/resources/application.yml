server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  profiles:
    active: dev
  # database config
  datasource:
    url: jdbc:mysql://localhost:3350/marine_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      continue-on-error: true

  # Redis config
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      #password: 123456
      database: 0
      timeout: 10000ms
      # Lettuce
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Spring AI
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:dashscope-key}
      chat:
        options:
          model: deepseek-v3.2 #qwen-plus
        embedding:
          options:
            model: text-embedding-v3
    vectorstore:
      redis:
        initialize-schema: true
        index-name: custom-index
        prefix: custom-prefix
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:openai-key}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: glm-4-flash
          temperature: 0.7

  # static resources upload config
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/, file:./uploads/


jwt:
  secret: ${JWT_SECRET:marine-education-jwt-secret}
  expiration: 86400000

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.gdou.marine.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  # LangChain4j AI config
  ai:
    api-key: ${APP_AI_API_KEY:app-ai-key}
    chat:
      model: qwen-plus-2025-12-01
    embedding:
      model: text-embedding-v4
      dimension: 1024
    vectorstore:
      redis:
        index-name: rag-index
        prefix: rag:chunk
  # 七牛云对象存储
  qiniu:
    access-key: ${QINIU_ACCESS_KEY:your-qiniu-ak}
    secret-key: ${QINIU_SECRET_KEY:your-qiniu-sk}
    bucket: ${QINIU_BUCKET:your-bucket}
    domain: ${QINIU_DOMAIN:http://your-domain.clouddn.com}
  upload:
    base-dir: uploads
    avatar-dir: uploads/avatars
